<!DOCTYPE html>
<html>
<head>
    <title>Dashboard - MentorMesh</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<nav class="navbar">
    <h1>MentorMesh</h1>
    <div>
        <a href="dashboard.html">Dashboard</a>
        <a href="profile.html">Profile</a>
        <a href="match.html">Match</a>
        <a href="requests.html">Requests</a>
    </div>
</nav>

<div class="dashboard-container">

    <h2 id="welcomeText"></h2>

    <!-- STATS -->
    <div class="stats-grid">
        <div class="stat-card">
            <h3 id="teachCount">0</h3>
            <p>Teaching Skills</p>
        </div>

        <div class="stat-card">
            <h3 id="learnCount">0</h3>
            <p>Learning Skills</p>
        </div>

        <div class="stat-card">
            <h3 id="requestCount">0</h3>
            <p>Requests</p>
        </div>
    </div>

    <!-- SKILLS -->
    <div class="dashboard-grid">

        <div class="card">
            <h3>Teaching Skills</h3>
            <div id="teachSkills" class="skill-box"></div>
        </div>

        <div class="card">
            <h3>Learning Skills</h3>
            <div id="learnSkills" class="skill-box"></div>
        </div>

    </div>

</div>

<script src="js/dashboard.js"></script>

</body>
</html>
